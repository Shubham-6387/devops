apiVersion: v1
kind: Service
metadata:
  name: clonecloud-mongodb-service
  namespace: {{ .Values.global.namespace | default "clonecloud-main" }}
  labels:
    app: clonecloud
    component: mongodb
spec:
  ports:
    - port: {{ .Values.mongodb.port }}
      targetPort: {{ .Values.mongodb.port }}
      protocol: TCP
  selector:
    app: clonecloud
    component: mongodb
  type: ClusterIP
