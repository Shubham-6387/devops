apiVersion: apps/v1
kind: Deployment
metadata:
  name: clonecloud-backend
  namespace: {{ .Values.global.namespace | default "clonecloud-main" }}
  labels:
    app: {{ .Values.global.appName | default "powerhub" }}
    component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.global.appName | default "powerhub" }}
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ .Values.global.appName | default "powerhub" }}
        component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
          imagePullPolicy: {{ .Values.backend.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
              name: http
          env:
            - name: PORT
              value: "{{ .Values.backend.port }}"
            - name: NODE_ENV
              value: {{ .Values.backend.nodeEnv | default "production" | quote }}
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: clonecloud-mongodb-secret
                  key: mongodb-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: clonecloud-mongodb-secret
                  key: jwt-secret
            - name: FOOD_API_BASE
              valueFrom:
                secretKeyRef:
                  name: clonecloud-mongodb-secret
                  key: food-api-base
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: {{ .Values.backend.port }}
            failureThreshold: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}

