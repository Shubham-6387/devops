apiVersion: v1
kind: Secret
metadata:
  name: clonecloud-mongodb-secret
  namespace: {{ .Values.global.namespace | default "clonecloud-main" }}
  labels:
    app: {{ .Values.global.appName | default "powerhub" }}
type: Opaque
data:
  # Base64-encoded MongoDB credentials
  mongodb-root-username: {{ .Values.mongodb.rootUser | b64enc | quote }}
  mongodb-root-password: {{ .Values.mongodb.rootPassword | b64enc | quote }}
  # Full MongoDB connection URI for PowerHub backend
  mongodb-uri: {{ printf "mongodb://%s:%s@clonecloud-mongodb-service:%d/%s?authSource=admin" .Values.mongodb.rootUser .Values.mongodb.rootPassword (int .Values.mongodb.port) .Values.mongodb.databaseName | b64enc | quote }}
  # PowerHub application secrets
  jwt-secret: {{ .Values.backend.jwtSecret | b64enc | quote }}
  food-api-base: {{ .Values.backend.foodApiBase | b64enc | quote }}

