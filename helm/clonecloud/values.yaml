# Default values for PowerHub DevSecOps Helm Chart

global:
  namespace: clonecloud-main
  appName: powerhub

# MongoDB Configuration
mongodb:
  image: mongo
  tag: "6.0"
  port: 27017
  storageSize: 2Gi
  # Credentials
  rootUser: dbadmin
  rootPassword: SuperSecurePassword123
  databaseName: powerhub

# PowerHub Backend (Node.js / Express) Configuration
backend:
  replicaCount: 2
  image: powerhub/backend
  tag: latest
  imagePullPolicy: IfNotPresent
  port: 5000
  # PowerHub-specific environment variables (stored as K8s Secret)
  jwtSecret: "powerhub_jwt_super_secret_change_in_prod"
  foodApiBase: "https://world.openfoodfacts.org"
  nodeEnv: "production"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# PowerHub Frontend (React / Nginx) Configuration
frontend:
  replicaCount: 2
  image: powerhub/frontend
  tag: latest
  imagePullPolicy: IfNotPresent
  port: 80
  serviceType: NodePort
  nodePort: 30080
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
