version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: clonecloud-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - clonecloud-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clonecloud-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/clonecloud
    depends_on:
      - mongodb
    networks:
      - clonecloud-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clonecloud-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - clonecloud-network
    restart: unless-stopped

networks:
  clonecloud-network:
    driver: bridge

volumes:
  mongodb_data:
